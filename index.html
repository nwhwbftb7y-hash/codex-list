<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f3ed" />
    <title>今天 · Todo List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-card" aria-labelledby="page-title">
        <header class="hero">
          <div>
            <p class="eyebrow" id="date-label"></p>
            <h1 id="page-title">今天要做什么？</h1>
            <p class="subtitle">把脑袋里的小事放下来，一件一件完成。</p>
          </div>
          <div class="progress-ring" id="progress-ring" aria-label="完成进度 0%">
            <span id="progress-value">0%</span>
          </div>
        </header>

        <nav class="page-nav" aria-label="页面导航">
          <a class="active" href="index.html">任务清单</a>
          <a href="manage.html">周期管理与总结</a>
          <a href="calendar.html">日历</a>
        </nav>

        <form class="add-form" id="todo-form">
          <div class="add-row">
            <label class="sr-only" for="todo-input">添加新任务</label>
            <span class="plus" aria-hidden="true">＋</span>
            <input id="todo-input" type="text" maxlength="100" placeholder="添加一个新任务…" autocomplete="off" />
            <button class="add-button" type="submit">添加</button>
          </div>
          <fieldset class="category-picker">
            <legend>选择分类</legend>
            <label class="category-option category-red">
              <input type="radio" name="category" value="urgent-important" />
              <span></span>紧急重要
            </label>
            <label class="category-option category-orange">
              <input type="radio" name="category" value="important" checked />
              <span></span>重要不紧急
            </label>
            <label class="category-option category-green">
              <input type="radio" name="category" value="low" />
              <span></span>不紧急不重要
            </label>
          </fieldset>
          <label class="deadline-field" for="deadline-input">
            <span>DDL（可选）</span>
            <input id="deadline-input" type="datetime-local" />
          </label>
          <div class="repeat-fields">
            <label for="repeat-select">重复</label>
            <select id="repeat-select">
              <option value="none">不重复</option>
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
            </select>
            <label class="repeat-on weekly-repeat" for="weekly-day" hidden>每周</label>
            <select id="weekly-day" class="repeat-on weekly-repeat" hidden>
              <option value="1">星期一</option><option value="2">星期二</option>
              <option value="3">星期三</option><option value="4">星期四</option>
              <option value="5">星期五</option><option value="6">星期六</option>
              <option value="0">星期日</option>
            </select>
            <label class="repeat-on monthly-repeat" for="monthly-day" hidden>每月</label>
            <select id="monthly-day" class="repeat-on monthly-repeat" hidden></select>
            <label class="repeat-end" for="repeat-end" hidden>结束于（留空默认10年后）</label>
            <input id="repeat-end" class="repeat-end" type="date" hidden />
          </div>
        </form>

        <div class="toolbar"><strong>待完成</strong></div>

        <ul class="todo-list" id="todo-list" aria-live="polite"></ul>

        <details class="completed-section" id="completed-section">
          <summary>
            <span>已完成 <b id="completed-count">0</b></span>
            <button class="clear-completed" id="clear-completed" type="button">清除已完成</button>
          </summary>
          <ul class="todo-list completed-list" id="completed-list" aria-live="polite"></ul>
          <p class="completed-empty" id="completed-empty">还没有已完成的任务。</p>
        </details>

        <div class="empty-state" id="empty-state" hidden>
          <div class="empty-icon">✓</div>
          <h2>这里很清爽</h2>
          <p>添加一件想完成的事吧。</p>
        </div>

        <footer class="footer">
          <p id="items-left">0 件待完成</p>
          <p class="tip">点击圆圈完成任务</p>
        </footer>
      </section>
    </main>

    <template id="todo-template">
      <li class="todo-item">
        <button class="toggle" type="button" aria-label="标记为已完成">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 10 3.2 3.2L15.5 6.8" /></svg>
        </button>
        <div class="todo-content">
          <div class="todo-mainline">
            <span class="todo-text"></span>
          </div>
          <time class="todo-deadline" hidden></time>
          <span class="repeat-mark" hidden></span>
        </div>
        <button class="edit" type="button" aria-label="编辑任务">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 14.5V17h2.5L15 8.5 11.5 5 4 12.5v2ZM10.5 6l3.5 3.5" /></svg>
        </button>
        <button class="delete" type="button" aria-label="删除任务">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 5l10 10M15 5 5 15" /></svg>
        </button>
      </li>
    </template>

    <dialog class="edit-dialog" id="edit-dialog">
      <form method="dialog" id="edit-form">
        <div class="dialog-heading">
          <div><p>编辑日程</p><h2 id="edit-title">修改任务</h2></div>
          <button class="dialog-close" type="button" aria-label="关闭">×</button>
        </div>
        <label>任务名称<input id="edit-text" maxlength="100" required /></label>
        <label>分类
          <select id="edit-category">
            <option value="urgent-important">紧急重要</option>
            <option value="important">重要不紧急</option>
            <option value="low">不紧急不重要</option>
          </select>
        </label>
        <label>DDL<input id="edit-deadline" type="datetime-local" /></label>
        <div class="dialog-actions single-actions">
          <button class="secondary" id="save-single" type="button">仅修改此日程</button>
          <button class="primary" id="save-future" type="button">修改此日程及以后</button>
        </div>
        <div class="dialog-actions delete-actions">
          <button class="danger-soft" id="delete-single" type="button">仅删除此日程</button>
          <button class="danger-soft" id="delete-future" type="button">删除此日程及以后</button>
          <button class="danger" id="delete-all" type="button">删除所有重复日程</button>
        </div>
      </form>
    </dialog>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
